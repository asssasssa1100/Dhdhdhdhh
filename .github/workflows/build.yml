name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP if present
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP"
            unzip -o "$ZIP" -d _extracted
            PKG=$(find _extracted -name "package.json" ! -path "*/node_modules/*" | head -1)
            ROOT=$(dirname "$PKG")
            echo "Project root inside ZIP: $ROOT"
            cp -r "$ROOT"/. .
            rm -rf _extracted "$ZIP"
          fi
          echo "package.json exists: $(test -f package.json && echo YES || echo NO)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          BASE_PATH: /
          NODE_ENV: production
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install --save \
            @capacitor/core@latest \
            @capacitor/cli@latest \
            @capacitor/android@latest

      - name: Initialize Capacitor
        run: npx cap init "Mini CV" "com.minicv.app" --web-dir dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-cv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
