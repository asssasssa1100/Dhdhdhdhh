name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini-cv-project   # ← هذا يحل المشكلة

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build frontend
        working-directory: mini-cv-project/artifacts/mini-cv
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production
        run: pnpm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        working-directory: mini-cv-project/artifacts/mini-cv
        run: |
          npm install --save \
            @capacitor/core@latest \
            @capacitor/cli@latest \
            @capacitor/android@latest

      - name: Initialize Capacitor
        working-directory: mini-cv-project/artifacts/mini-cv
        run: |
          npx cap init "Mini CV" "com.minicv.app" \
            --web-dir dist/public

      - name: Add Android platform
        working-directory: mini-cv-project/artifacts/mini-cv
        run: npx cap add android

      - name: Sync web assets to Android
        working-directory: mini-cv-project/artifacts/mini-cv
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mini-cv-project/artifacts/mini-cv/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-cv-debug-apk
          path: mini-cv-project/artifacts/mini-cv/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
